<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse Companions · Aurélie</title>
  <meta name="description" content="Browse and filter verified companions by city, language, services, and price.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html">Aurélie<span class="dot">.</span></a>
      <nav>
        <ul class="nav-links">
          <li><a href="browse.html" class="active">Companions</a></li>
          <li><a href="index.html#so">How it works</a></li>
          <li><a href="index.html#cities">Cities</a></li>
          <li><a href="impressum.html">Contact</a></li>
        </ul>
      </nav>
      <div class="nav-cta">
        <a class="btn btn-primary" href="browse.html">Browse</a>
        <button class="nav-toggle" aria-label="Open menu" aria-expanded="false" data-icon="menu"></button>
      </div>
    </div>
  </header>

  <main class="wrap section" style="padding-top:2.5rem">
    <div class="sec-head" style="margin-bottom:1.75rem">
      <h2>Companions</h2>
      <p>Filter by city, language, services, and price.</p>
    </div>

    <div class="browse">
      <aside class="filters" id="filters" aria-label="Filters">
        <div class="searchbar" style="margin-bottom:.5rem">
          <span data-icon="search" style="display:inline-flex"></span>
          <input type="search" id="search" placeholder="Name, city, service ..." aria-label="Search">
        </div>
      </aside>

      <section>
        <div class="browse-head">
          <button class="btn btn-ghost filter-toggle" id="filter-toggle" aria-expanded="false">
            <span data-icon="sliders" style="display:inline-flex"></span> Filters
          </button>
          <div class="browse-count" id="count"></div>
          <div class="field" style="margin:0;min-width:190px">
            <select id="sort" aria-label="Sort">
              <option value="featured">Featured</option>
              <option value="newest">Newest</option>
              <option value="price-asc">Price: low to high</option>
              <option value="price-desc">Price: high to low</option>
            </select>
          </div>
        </div>
        <div class="grid-cards" id="results"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="footer-bottom" style="border-top:0;margin-top:0">
        <span>&copy; <span data-year></span> Aurélie. Prototype and demo project.</span>
        <span><a href="impressum.html">Imprint</a> &middot; <a href="datenschutz.html">Privacy Policy</a> &middot; <a href="agb.html">Terms</a></span>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/site.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
