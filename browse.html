<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Begleiterinnen entdecken · Aurélie</title>
  <meta name="description" content="Durchsuchen und filtern Sie verifizierte Begleiterinnen nach Stadt, Sprache, Begleitung und Preis.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="index.html">Aurélie<span class="dot">.</span></a>
      <nav>
        <ul class="nav-links">
          <li><a href="browse.html" class="active">Begleiterinnen</a></li>
          <li><a href="index.html#so">So funktioniert es</a></li>
          <li><a href="index.html#staedte">Städte</a></li>
          <li><a href="impressum.html">Kontakt</a></li>
        </ul>
      </nav>
      <div class="nav-cta">
        <a class="btn btn-primary" href="browse.html">Entdecken</a>
        <button class="nav-toggle" aria-label="Menü öffnen" aria-expanded="false" data-icon="menu"></button>
      </div>
    </div>
  </header>

  <main class="wrap section" style="padding-top:2.5rem">
    <div class="sec-head" style="margin-bottom:1.75rem">
      <h2>Begleiterinnen</h2>
      <p>Filtern Sie nach Stadt, Sprache, Begleitung und Preis.</p>
    </div>

    <div class="browse">
      <aside class="filters" id="filters" aria-label="Filter">
        <div class="searchbar" style="margin-bottom:.5rem">
          <span data-icon="search" style="display:inline-flex"></span>
          <input type="search" id="search" placeholder="Name, Stadt, Begleitung ..." aria-label="Suche">
        </div>
      </aside>

      <section>
        <div class="browse-head">
          <button class="btn btn-ghost filter-toggle" id="filter-toggle" aria-expanded="false">
            <span data-icon="sliders" style="display:inline-flex"></span> Filter
          </button>
          <div class="browse-count" id="count"></div>
          <div class="field" style="margin:0;min-width:190px">
            <select id="sort" aria-label="Sortieren">
              <option value="featured">Empfohlen</option>
              <option value="newest">Neu dabei</option>
              <option value="price-asc">Preis aufsteigend</option>
              <option value="price-desc">Preis absteigend</option>
            </select>
          </div>
        </div>
        <div class="grid-cards" id="results"></div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div class="footer-bottom" style="border-top:0;margin-top:0">
        <span>&copy; <span data-year></span> Aurélie. Prototyp und Beispielprojekt.</span>
        <span><a href="impressum.html">Impressum</a> &middot; <a href="datenschutz.html">Datenschutz</a> &middot; <a href="agb.html">AGB</a></span>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/site.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
